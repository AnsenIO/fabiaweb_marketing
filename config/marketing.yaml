brand:
  name: FABIABox
  tagline: "The AI Co-Founder That Ships Your Company."
  website: https://fabiabox.com
  shop: https://shop.fabiabox.com
  currency: EUR

content_pillars:
  - founder_transformation
  - process_transparency
  - sovereign_ai
  - traction_receipts

channels:
  email:
    enabled: true
    provider: mailtrain
    list_id: ""
    sender: "andrea@iabai.com"
    welcome_sequence_days: [0, 2, 5, 8, 12]

  twitter:
    enabled: true
    handle: "@fabiabox"

  discord:
    enabled: true
    webhook_url: ""
    announcement_channel: "#announcements"

  meta:
    enabled: true
    ad_account_id: ""
    business_manager_id: ""
    pixel_id: ""
    page_id: ""
    access_token: ""
    app_id: ""
    app_secret: ""
    # PAUSED = safe default; set ACTIVE only when you are ready to spend
    ad_status: PAUSED
    # EU DSA fields: who the ad promotes and who pays for it
    dsa:
      beneficiary: "FABIABox"
      payor: "IABAI"
    # Creative asset (must be publicly accessible)
    image_url: "https://raw.githubusercontent.com/AnsenIO/fabiaweb_marketing/main/assets/images/fabia_ad_1.png"
    image_path: "assets/images/fabia_ad_1.png"
    campaigns:
      retargeting_website:
        name: "FABIABox — Website Retargeting"
        objective: OUTCOME_TRAFFIC
        daily_budget_eur: 20
        audiences:
          - website_visitors
          - waitlist
          - content_engagers

llm:
  base_url: "http://127.0.0.1:11435/v1"
  api_key: "not-needed"
  model: "default"
  temperature: 0.7

dry_run: true
